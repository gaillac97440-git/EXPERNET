<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Alerte SOC - Saturation Disque(96%)</title>
  <style>
    .btn-ssh {
      opacity: 1;
      transition: opacity 0.2 ease;
    }
    .btn-ssh:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#0f172a;">

  <!-- Tableau principal : fond sombre, centrage global -->
  <table width="100%" border="0" cellpadding="0" cellspacing="0" style="background-color:#0f172a;">
    <tr>
      <td align="center" style="padding:20px;">

        <!-- Sous-tableau conteneur : largeur 100% mais plafonné à 600px -->
        <table width="100%" border="0" cellpadding="0" cellspacing="0" style="max-width:600px; background-color:#1e293b;">

          <!-- Bandeau d'en-tête rouge = alerte critique -->
          <tr>
            <td style="background-color:#dc2626; padding:15px; text-align:center;">
              <span style="color:#ffffff; font-family:Arial, sans-serif; font-size:18px; font-weight:bold;">
                ⚠ ALERTE CRITIQUE - SATURATION DISQUE ⚠
              </span>
            </td>
          </tr>

          <!-- Corps du message : texte brut en monospace -->
          <tr>
            <td style="font-family:monospace; font-size:14px; color:#ffffff; padding:20px;">
              <span style="color:#ef4444; font-weight:bold;">[CRITICAL FAULT]</span><br><br>
              Serveur&nbsp;: SRV-DB-PROD-01<br>
              Volume&nbsp;: /dev/sda3<br>
              Utilisation&nbsp;: 96%<br>
              Statut&nbsp;: Espace disque critique
            </td>
          </tr>

          <!-- Bouton CTA construit en cellule de tableau -->
          <tr>
            <td align="center" style="padding:20px;">
              <table border="0" cellpadding="0" cellspacing="0">
                <tr>
                  <td class="btn-ssh" align="center" style="background-color:#2563eb; padding:12px 24px; border-radius:4px;">
                    <a href="#" style="color:#ffffff; font-family:Arial, sans-serif; font-size:14px; font-weight:bold; text-decoration:none;">
                      Accéder à la console SSH
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- fin sous-tableau 600px -->

      </td>
    </tr>
  </table>
  <!-- fin tableau principal -->

</body>
</html>
